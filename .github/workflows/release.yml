name: Chrome Extension Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Holt den gesamten Git-Verlauf, um Commits zu analysieren

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Extract Extension Metadata
        id: meta
        run: |
          # Extrahiere Version aus manifest.json
          VERSION=$(node -e "console.log(require('./manifest.json').version)")
          NAME=$(node -e "console.log(require('./manifest.json').name)")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "name=$NAME" >> $GITHUB_OUTPUT
          
          # Ordnername ermitteln
          REPO_NAME=$(basename $GITHUB_REPOSITORY)
          echo "repo_name=$REPO_NAME" >> $GITHUB_OUTPUT
          
          # Letzte Commits holen
          COMMITS=$(git log -n 5 --oneline)
          COMMITS_JSON=$(echo "$COMMITS" | jq -R -s '.')
          echo "commits=$COMMITS_JSON" >> $GITHUB_OUTPUT

          # Versionsnummer aus dem vorherigen Commit holen
          PREV_VERSION=$(git show HEAD~1:manifest.json 2>/dev/null | node -e "let d=''; process.stdin.on('data',c=>d+=c).on('end',()=>{try{console.log(JSON.parse(d).version)}catch(e){console.log('0.0.0')}})" || echo "0.0.0")
          echo "prev_version=$PREV_VERSION" >> $GITHUB_OUTPUT

          echo "Current version: $VERSION"
          echo "Previous version: $PREV_VERSION"

      - name: Check if version changed
        id: version_check
        run: |
          CURRENT="${{ steps.meta.outputs.version }}"
          PREVIOUS="${{ steps.meta.outputs.prev_version }}"
          if [ "$CURRENT" = "$PREVIOUS" ]; then
            echo "Version unchanged ($CURRENT). Skipping Chrome Web Store upload."
            echo "should_deploy=false" >> $GITHUB_OUTPUT
          else
            echo "Version changed from $PREVIOUS to $CURRENT. Deploying."
            echo "should_deploy=true" >> $GITHUB_OUTPUT
          fi

      - name: Zip Extension
        if: steps.version_check.outputs.should_deploy == 'true'
        run: |
          zip -r extension.zip . -x "*.git*" "*node_modules*" "*.env*" "*extension.zip"

      - name: Upload and Publish to Chrome Web Store
        if: steps.version_check.outputs.should_deploy == 'true'
        run: |
          npx chrome-webstore-upload-cli@3.2.0 upload \
            --source extension.zip \
            --extension-id "${{ secrets.CHROME_EXTENSION_ID }}" \
            --client-id "${{ secrets.CHROME_CLIENT_ID }}" \
            --client-secret "${{ secrets.CHROME_CLIENT_SECRET }}" \
            --refresh-token "${{ secrets.CHROME_REFRESH_TOKEN }}" \
            --auto-publish

      - name: Notify Portfolio Repository
        if: steps.version_check.outputs.should_deploy == 'true'
        run: |
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.PORTFOLIO_PAT }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/exUs541/portfolio/dispatches \
            -d '{
              "event_type": "extension_update",
              "client_payload": {
                "extension_name": "${{ steps.meta.outputs.repo_name }}",
                "display_name": "${{ steps.meta.outputs.name }}",
                "version": "${{ steps.meta.outputs.version }}",
                "commits": ${{ steps.meta.outputs.commits }},
                "is_new": false
              }
            }'
